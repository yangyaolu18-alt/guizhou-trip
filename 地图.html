<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贵州4天3晚团建路线图</title>
    <!-- 引入 Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft YaHei", sans-serif;
            background: #f5f5f5;
        }
        
        #map {
            width: 100%;
            height: calc(100vh - 220px);
            min-height: 500px;
        }
        
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .header p {
            font-size: 14px;
            opacity: 0.8;
        }
        
        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 15px;
            background: white;
            flex-wrap: wrap;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
        }
        
        .legend-color {
            width: 24px;
            height: 4px;
            border-radius: 2px;
        }
        
        .info-panel {
            padding: 15px 20px;
            background: white;
            border-top: 1px solid #eee;
        }
        
        .info-panel h3 {
            font-size: 15px;
            color: #333;
            margin-bottom: 10px;
        }
        
        .route-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 10px;
        }
        
        .route-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 13px;
        }
        
        .route-day {
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 4px;
            color: white;
            font-size: 12px;
        }
        
        .route-day.d1 { background: #FF6B6B; }
        .route-day.d2 { background: #4ECDC4; }
        .route-day.d3 { background: #45B7D1; }
        .route-day.d4 { background: #96CEB4; }
        
        .route-detail {
            color: #666;
        }
        
        .route-km {
            color: #999;
            font-size: 12px;
        }
        
        /* 自定义 marker */
        .custom-marker {
            background: white;
            border: 3px solid #E74C3C;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #333;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        
        .leaflet-popup-content-wrapper {
            border-radius: 10px;
        }
        
        .popup-content {
            text-align: center;
            min-width: 150px;
        }
        
        .popup-content h4 {
            color: #E74C3C;
            margin-bottom: 8px;
            font-size: 15px;
        }
        
        .popup-content p {
            color: #666;
            font-size: 13px;
            margin: 4px 0;
        }
        
        .popup-content .ticket {
            background: #f0f0f0;
            padding: 4px 8px;
            border-radius: 4px;
            margin-top: 6px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🗺️ 贵州4天3晚团建路线图</h1>
        <p>10人公司团建 | 2026.05.15-05.18 | 自驾行程</p>
    </div>
    
    <div class="legend">
        <div class="legend-item">
            <div class="legend-color" style="background: #FF6B6B;"></div>
            <span>D1 抵达日</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #4ECDC4;"></div>
            <span>D2 黄果树</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #45B7D1;"></div>
            <span>D3 探洞+苗寨</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #96CEB4;"></div>
            <span>D4 收尾日</span>
        </div>
    </div>
    
    <div id="map"></div>
    
    <div class="info-panel">
        <h3>📍 行程距离</h3>
        <div class="route-info">
            <div class="route-item">
                <span class="route-day d1">D1</span>
                <span class="route-detail">机场 → 青岩古镇 → 贵阳</span>
                <span class="route-km">约75km</span>
            </div>
            <div class="route-item">
                <span class="route-day d2">D2</span>
                <span class="route-detail">贵阳 → 黄果树 → 贵阳</span>
                <span class="route-km">约260km</span>
            </div>
            <div class="route-item">
                <span class="route-day d3">D3</span>
                <span class="route-detail">贵阳 → 织金洞 → 苗寨 → 贵阳</span>
                <span class="route-km">约390km</span>
            </div>
            <div class="route-item">
                <span class="route-day d4">D4</span>
                <span class="route-detail">贵阳内自由活动 → 返程</span>
                <span class="route-km">约50km</span>
            </div>
        </div>
    </div>

    <!-- 引入 Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 初始化地图，以贵州为中心
        var map = L.map('map').setView([26.5, 106.8], 8);
        
        // 使用 OpenStreetMap 瓦片
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors',
            maxZoom: 18
        }).addTo(map);
        
        // 景点数据
        var locations = [
            {
                name: '贵阳',
                coords: [26.57, 106.71],
                desc: '住宿+活动中心',
                icon: '🏨'
            },
            {
                name: '龙洞堡机场',
                coords: [26.54, 106.80],
                desc: '落地地点',
                icon: '✈️'
            },
            {
                name: '青岩古镇',
                coords: [26.35, 106.68],
                desc: '明清古巷，美食：卤猪脚',
                icon: '🏯',
                ticket: '¥40/人'
            },
            {
                name: '黄果树瀑布',
                coords: [26.00, 105.67],
                desc: '亚洲第一瀑，水帘洞',
                icon: '💧',
                ticket: '¥160/人 + ¥50观光车'
            },
            {
                name: '织金洞',
                coords: [26.67, 105.77],
                desc: '中国最大钟乳石洞，洞内16℃',
                icon: '🕳️',
                ticket: '¥120/人'
            },
            {
                name: '西江千户苗寨',
                coords: [26.50, 108.18],
                desc: '世界最大苗族聚居地',
                icon: '🏘️',
                ticket: '¥110/人'
            },
            {
                name: '甲秀楼',
                coords: [26.58, 106.72],
                desc: '贵阳地标，免费',
                icon: '🏯'
            }
        ];
        
        // 路线数据 [起点, 终点, 距离km]
        var routes = [
            { from: [26.54, 106.80], to: [26.35, 106.68], color: '#FF6B6B', day: 'D1', km: 35 },  // 机场→青岩
            { from: [26.35, 106.68], to: [26.57, 106.71], color: '#FF6B6B', day: 'D1', km: 40 },  // 青岩→贵阳
            { from: [26.57, 106.71], to: [26.00, 105.67], color: '#4ECDC4', day: 'D2', km: 130 }, // 贵阳→黄果树
            { from: [26.00, 105.67], to: [26.57, 106.71], color: '#4ECDC4', day: 'D2', km: 130 }, // 黄果树→贵阳
            { from: [26.57, 106.71], to: [26.67, 105.77], color: '#45B7D1', day: 'D3', km: 150 }, // 贵阳→织金洞
            { from: [26.67, 105.77], to: [26.50, 108.18], color: '#45B7D1', day: 'D3', km: 120 }, // 织金洞→苗寨
            { from: [26.50, 108.18], to: [26.57, 106.71], color: '#45B7D1', day: 'D3', km: 120 }, // 苗寨→贵阳
        ];
        
        // 绘制路线
        routes.forEach(function(route) {
            // 绘制线
            var latlngs = [
                [route.from[0], route.from[1]],
                [route.to[0], route.to[1]]
            ];
            
            var polyline = L.polyline(latlngs, {
                color: route.color,
                weight: 5,
                opacity: 0.8,
                smoothFactor: 1
            }).addTo(map);
            
            // 在线中间标注距离
            var midLat = (route.from[0] + route.to[0]) / 2;
            var midLng = (route.from[1] + route.to[1]) / 2;
            
            // 计算线的角度，用于放置标签
            var angle = Math.atan2(route.to[0] - route.from[0], route.to[1] - route.from[1]) * 180 / Math.PI;
            
            // 创建距离标签
            var label = L.marker([midLat, midLng], {
                icon: L.divIcon({
                    className: 'distance-label',
                    html: '<div style="background:' + route.color + ';color:white;padding:2px 6px;border-radius:10px;font-size:11px;font-weight:bold;white-space:nowrap;">' + route.km + 'km</div>',
                    iconSize: [50, 20],
                    iconAnchor: [25, 10]
                })
            }).addTo(map);
        });
        
        // 绘制景点标记
        locations.forEach(function(loc, index) {
            var marker = L.marker(loc.coords, {
                icon: L.divIcon({
                    className: 'custom-marker-wrapper',
                    html: '<div class="custom-marker">' + loc.icon + '</div>',
                    iconSize: [32, 32],
                    iconAnchor: [16, 16]
                })
            }).addTo(map);
            
            // 弹窗内容
            var popupContent = '<div class="popup-content">';
            popupContent += '<h4>' + loc.name + '</h4>';
            popupContent += '<p>' + loc.desc + '</p>';
            if (loc.ticket) {
                popupContent += '<span class="ticket">🎫 ' + loc.ticket + '</span>';
            }
            popupContent += '</div>';
            
            marker.bindPopup(popupContent);
        });
        
        // 地图缩放到所有标记可见
        var group = new L.featureGroup(locations.map(function(loc) {
            return L.marker(loc.coords);
        }));
        map.fitBounds(group.getBounds().pad(0.1));
        
    </script>
</body>
</html>
